<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TU CARD ROGUE - Battle Simulator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a12;--surface:#14142a;--surface2:#1e1e3a;
--red:#ff4757;--blue:#3b82f6;--green:#2ed573;
--gold:#ffd700;--text:#e8e8f0;--text2:#8888aa;
--accent:#a855f7;--curse:#c084fc;--poison:#22c55e;--sleep:#60a5fa;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;-webkit-tap-highlight-color:transparent;font-size:11px}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;background:linear-gradient(180deg,#0a0a1a 0%,#1a0a2e 50%,#0a0a1a 100%)}
.title-logo{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gold),#ff8c00,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;margin-bottom:8px}
.title-sub{font-size:11px;color:var(--text2);margin-bottom:40px;letter-spacing:4px}
.btn{padding:10px 28px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),#7c3aed);color:white;box-shadow:0 4px 15px rgba(168,85,247,0.4)}
.btn-primary:active{transform:scale(0.96)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid #333}
.btn-sm{padding:5px 12px;font-size:11px}
/* Party Select */
.screen-header{padding:8px 12px;background:var(--surface);border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.screen-title{font-size:13px;font-weight:700}
.slot-count{font-size:11px;color:var(--accent)}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:6px}
.card-item{background:var(--surface);border-radius:6px;overflow:hidden;cursor:pointer;transition:all .15s;border:2px solid transparent;position:relative}
.card-item:active{transform:scale(0.97)}
.card-item.selected{border-color:var(--gold);box-shadow:0 0 8px rgba(255,215,0,0.3)}
.card-item.selected::after{content:'\2713';position:absolute;top:2px;right:2px;background:var(--gold);color:#000;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900}
.card-attr-line{height:2px;width:100%}
.attr-R{background:var(--red)}.attr-B{background:var(--blue)}.attr-G{background:var(--green)}
.card-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface2)}
.card-name{padding:2px 4px;font-size:8px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-char{padding:0 4px 2px;font-size:7px;color:var(--text2)}
.card-stats-mini{display:flex;gap:1px;padding:1px 4px 3px;flex-wrap:wrap}
.stat-tag{font-size:7px;padding:0 2px;border-radius:2px;background:rgba(255,255,255,0.05)}
.filter-bar{padding:6px 8px;background:var(--surface);display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid #222}
.filter-btn{padding:4px 10px;border-radius:14px;font-size:10px;cursor:pointer;border:1px solid #333;background:transparent;color:var(--text2);font-family:inherit}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(168,85,247,0.1)}
.search-input{width:100%;padding:5px 8px;border-radius:6px;border:1px solid #333;background:var(--surface2);color:var(--text);font-size:11px;font-family:inherit;margin-bottom:2px}
.party-slots{padding:8px;background:var(--surface);border-top:1px solid #222;position:sticky;bottom:0;z-index:10}
.slots-row{display:flex;gap:4px;margin-bottom:4px}
.slot-label{font-size:9px;color:var(--text2);margin-bottom:2px}
.slot{width:38px;height:38px;border-radius:4px;border:1px dashed #444;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.slot img{width:100%;height:100%;object-fit:cover}
.slot .remove-btn{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:var(--red);color:white;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.party-actions{display:flex;gap:6px;justify-content:flex-end}
.enemy-select-mode{display:flex;gap:6px;padding:6px 8px}
.tab-btn{flex:1;padding:6px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.tab-btn.active{background:var(--accent);color:white}
.tab-btn:not(.active){background:var(--surface2);color:var(--text2)}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-content{background:var(--surface);border-radius:12px 12px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
.modal-header{position:relative;overflow:hidden}
.modal-img{width:100%;aspect-ratio:16/9;object-fit:cover;object-position:top}
.modal-close{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.6);color:white;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:12px}
.modal-card-name{font-size:16px;font-weight:900;margin-bottom:2px}
.modal-char-name{font-size:11px;color:var(--text2);margin-bottom:8px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:12px}
.stat-box{background:var(--surface2);border-radius:4px;padding:6px;text-align:center}
.stat-label{font-size:8px;color:var(--text2)}
.stat-value{font-size:14px;font-weight:700}
.skill-list{display:flex;flex-direction:column;gap:6px}
.skill-item{background:var(--surface2);border-radius:6px;padding:8px}
.skill-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.skill-name{font-weight:700;font-size:12px}
.skill-costs{display:flex;gap:6px;font-size:10px}
.skill-tu{color:var(--gold)}.skill-mp-plus{color:var(--blue)}.skill-mp-minus{color:var(--red)}
.skill-effect{font-size:10px;color:var(--text2)}
.skill-condition{font-size:9px;color:var(--accent);margin-top:2px}
.skill-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700}
.badge-passive{background:rgba(46,213,115,0.15);color:var(--green)}
.badge-active{background:rgba(255,71,87,0.15);color:var(--red)}
.unique-box{background:linear-gradient(135deg,rgba(255,215,0,0.08),rgba(168,85,247,0.08));border:1px solid rgba(255,215,0,0.2);border-radius:6px;padding:8px;margin-bottom:10px}
.unique-label{font-size:8px;color:var(--gold);font-weight:700;margin-bottom:2px}
.unique-name{font-size:11px;font-weight:700;margin-bottom:2px}
.unique-effect{font-size:10px;color:var(--text2)}
/* Battle */
.battle-screen{display:flex;flex-direction:column;height:100vh;height:100dvh}
.battle-top-bar{background:var(--surface);padding:4px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222;font-size:10px;flex-shrink:0}
.tu-counter{color:var(--gold);font-weight:700;font-size:12px}
.battle-field{flex:1;overflow-y:auto;padding:4px}
.team-area{margin-bottom:2px}
.team-label{font-size:8px;color:var(--text2);padding:2px 6px;font-weight:700;display:flex;justify-content:space-between}
.unit-row{display:flex;gap:3px;padding:2px 4px}
.unit-card{background:var(--surface);border-radius:6px;padding:3px;width:calc(25% - 3px);text-align:center;position:relative;transition:all .2s;border:2px solid transparent;flex-shrink:0}
.unit-card.active{border-color:var(--gold);transform:scale(1.03);box-shadow:0 0 10px rgba(255,215,0,0.3)}
.unit-card.dead{opacity:0.25;filter:grayscale(1)}
.unit-card.targeted{border-color:var(--red);box-shadow:0 0 6px rgba(255,71,87,0.3);cursor:pointer}
.unit-card.target-selected{border-color:#ff0;box-shadow:0 0 8px rgba(255,255,0,0.5)}
.unit-thumb{width:100%;aspect-ratio:1;border-radius:3px;object-fit:cover;margin-bottom:1px}
.unit-name-sm{font-size:7px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row{display:flex;align-items:center;gap:2px;margin-top:1px}
.bar-label{font-size:6px;font-weight:700;min-width:10px;flex-shrink:0}
.bar-label-hp{color:var(--green)}.bar-label-mp{color:var(--blue)}
.bar-wrap{flex:1;height:3px;background:#333;border-radius:2px;overflow:hidden}
.bar-wrap-mp{height:2px}
.hp-fill{height:100%;border-radius:2px;transition:width .3s}
.hp-high{background:var(--green)}.hp-mid{background:var(--gold)}.hp-low{background:var(--red)}
.mp-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}
.bar-val{font-size:6px;color:var(--text2);min-width:16px;text-align:right;flex-shrink:0}
.tu-badge{font-size:6px;color:var(--gold);margin-top:1px}
.status-icons{display:flex;gap:1px;justify-content:center;margin-top:1px;flex-wrap:wrap}
.status-icon{font-size:7px;padding:0 1px;border-radius:2px;line-height:1.2}
.st-curse{background:rgba(192,132,252,0.3);color:var(--curse)}
.st-poison{background:rgba(34,197,94,0.3);color:var(--poison)}
.st-sleep{background:rgba(96,165,250,0.3);color:var(--sleep)}
.st-rage{background:rgba(255,71,87,0.2);color:var(--red)}
.st-charge{background:rgba(255,215,0,0.2);color:var(--gold)}
.st-block{background:rgba(100,100,255,0.2);color:#88f}
.st-spdup{background:rgba(0,255,0,0.15);color:#0f0}
.st-spddn{background:rgba(255,0,0,0.15);color:#f66}
.st-iron{background:rgba(255,255,255,0.1);color:#fff}
/* Timeline */
.timeline-bar{background:var(--surface);padding:3px 6px;border-top:1px solid #222;border-bottom:1px solid #222;flex-shrink:0}
.timeline-label{font-size:7px;color:var(--text2);margin-bottom:2px}
.timeline-units{display:flex;gap:2px;overflow-x:auto}
.tl-unit{min-width:30px;text-align:center;padding:1px 3px;border-radius:3px;font-size:7px;background:var(--surface2)}
.tl-unit.tl-ally{border-left:2px solid var(--blue)}
.tl-unit.tl-enemy{border-left:2px solid var(--red)}
.tl-unit.tl-active{background:var(--gold);color:#000;font-weight:700}
/* Battle log */
.battle-log-container{flex-shrink:0;position:relative}
.battle-log-header{display:flex;justify-content:space-between;align-items:center;padding:2px 8px;background:var(--surface);border-top:1px solid #222;cursor:pointer}
.battle-log-header span{font-size:8px;color:var(--text2)}
.battle-log{background:rgba(10,10,18,0.95);max-height:80px;overflow-y:auto;padding:4px 8px;transition:max-height .3s}
.battle-log.expanded{max-height:50vh;position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;z-index:60;border-top:2px solid var(--accent);padding-bottom:40px}
.log-entry{font-size:9px;padding:1px 0;border-bottom:1px solid rgba(255,255,255,0.02);display:flex;gap:4px}
.log-tu{color:var(--gold);min-width:32px;font-size:8px;flex-shrink:0}
.log-team-p{color:var(--blue)}
.log-team-e{color:var(--red)}
.log-dmg{color:var(--red)}.log-heal{color:var(--green)}.log-info{color:var(--text2)}.log-status{color:var(--accent)}
.log-close-btn{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:61}
/* Skill panel */
.skill-panel{background:var(--surface);padding:6px 8px;border-top:1px solid var(--gold);padding-bottom:max(12px,env(safe-area-inset-bottom));flex-shrink:0}
.skill-panel-title{font-size:10px;color:var(--gold);font-weight:700;margin-bottom:4px}
.skill-buttons{display:flex;flex-direction:column;gap:3px}
.skill-btn{background:var(--surface2);border:1px solid #333;border-radius:6px;padding:6px 8px;cursor:pointer;text-align:left;font-family:inherit;color:var(--text);transition:all .15s}
.skill-btn:active{transform:scale(0.98)}
.skill-btn:disabled{opacity:0.3;cursor:not-allowed}
.skill-btn-name{font-weight:700;font-size:11px}
.skill-btn-info{display:flex;gap:8px;font-size:9px;margin-top:1px}
.skill-btn-effect{font-size:9px;color:var(--text2);margin-top:1px}
/* Target selection */
.target-overlay{position:fixed;bottom:0;left:0;right:0;background:var(--surface);padding:10px;z-index:50;border-top:2px solid var(--gold);max-width:480px;margin:0 auto;padding-bottom:max(16px,env(safe-area-inset-bottom))}
.target-title{font-size:10px;color:var(--gold);margin-bottom:6px}
.target-info{font-size:9px;color:var(--text2);margin-bottom:4px}
.target-actions{display:flex;gap:6px;margin-top:8px}
/* Result */
.result-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
.result-text{font-family:'Orbitron',sans-serif;font-size:40px;font-weight:900;margin-bottom:16px}
.result-win{background:linear-gradient(135deg,var(--gold),#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-lose{background:linear-gradient(135deg,var(--red),#8b0000);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-btns{display:flex;gap:8px;flex-direction:column;align-items:center}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.shake{animation:shake .2s}
</style>
</head>

const{useState,useEffect,useRef,useCallback,createElement:h,Fragment}=React;
const ATTR_NAME={R:'赤',B:'青',G:'緑'};
const ATTR_ADV={R:'G',B:'R',G:'B'};
const ATTR_DIS={R:'B',B:'G',G:'R'};
function attrMul(a,d){if(ATTR_ADV[a]===d)return 1.25;if(ATTR_DIS[a]===d)return 0.8;return 1.0;}
function parseDmg(d){if(!d)return 0;if(d.includes('-')){const p=d.split('-');return(parseFloat(p[0])+parseFloat(p[1]))/2;}return parseFloat(d)||0;}

function mkUnit(card,team,idx){
  return{id:team+'_'+idx,cardId:card.id,name:card.name,char:card.char,attr:card.attr,at:card.at,img:card.img,
    maxHp:card.hp,hp:card.hp,atk:card.atk,pa:card.pa,sa:card.sa,pd:card.pd,sd:card.sd,spd:card.spd,
    mp:4,tu:0,team:team,alive:true,inField:idx<4,fieldOrder:idx,skills:card.skills,un:card.un,ue:card.ue,
    statuses:{},ironHeart:false,ironHeartUsed:false,lifeFlipUsed:false,tuElapsed:0,origPd:card.pd,origSd:card.sd,origPa:card.pa,origSa:card.sa};
}

function applyPassive(unit,allUnits,logs,globalTU){
  const p=unit.skills.find(s=>s.type==='パ');if(!p)return;
  const n=p.name;const tm=unit.team==='p'?'【味方】':'【敵】';
  if(n==='アイアンハート'){unit.ironHeart=true;}
  else if(n==='オートMP+2'){unit.mp=Math.min(10,unit.mp+2);logs.push({tu:globalTU,team:unit.team,t:'status',m:tm+unit.char+'：MP+2'});}
  else if(n==='オートレイジ'){unit.statuses.rage=3;logs.push({tu:globalTU,team:unit.team,t:'status',m:tm+unit.char+'：レイジ状態'});}
  else if(n==='オートカース'){
    const enemies=allUnits.filter(u=>u.team!==unit.team&&u.alive&&u.inField);
    if(enemies.length){const t=enemies[Math.floor(Math.random()*enemies.length)];t.statuses.curse=true;
    const etm=t.team==='p'?'【味方】':'【敵】';
    logs.push({tu:globalTU,team:unit.team,t:'status',m:tm+unit.char+'→'+etm+t.char+'：カース状態'});}
  }
  else if(n==='オート物攻ブースト'){unit.pa=Math.floor(unit.pa*1.1);logs.push({tu:globalTU,team:unit.team,t:'status',m:tm+unit.char+'：物攻UP'});}
  else if(n==='オート特攻ブースト'){unit.sa=Math.floor(unit.sa*1.1);logs.push({tu:globalTU,team:unit.team,t:'status',m:tm+unit.char+'：特攻UP'});}
  else if(n==='チャージアドバンス'){unit.statuses.charge=true;unit.hp=Math.min(unit.maxHp,unit.hp+Math.floor(unit.maxHp*0.05));logs.push({tu:globalTU,team:unit.team,t:'status',m:tm+unit.char+'：チャージ状態'});}
  else if(n==='ディフェンスブースト'){unit.pd=Math.floor(unit.pd*1.1);unit.sd=Math.floor(unit.sd*1.1);logs.push({tu:globalTU,team:unit.team,t:'status',m:tm+unit.char+'：防御UP'});}
}

function calcDmg(atk,def,skill){
  let mul=parseDmg(skill.dmg);if(mul===0)return 0;
  let as,ds;if(atk.at==='P'||atk.at==='M'){as=atk.pa;ds=def.pd;}else{as=atk.sa;ds=def.sd;}
  let base=(as*mul*0.5)/Math.max(1,ds*0.003);
  base=base*(1+atk.atk*0.0001);base*=attrMul(atk.attr,def.attr);
  if(atk.statuses.rage)base*=1.05;if(def.statuses.curse)base*=1.05;
  base*=(0.95+Math.random()*0.1);return Math.max(1,Math.floor(base));
}

function canUseSkill(unit,skill,allUnits){
  if(skill.mp<0&&unit.mp+skill.mp<0)return false;
  const c=skill.cond;if(!c)return true;
  if(c.includes('HP50%以下')&&unit.hp>unit.maxHp*0.5)return false;
  if(c.includes('HP75%以上')&&unit.hp<unit.maxHp*0.75)return false;
  if(c.includes('レイジ状態')&&!unit.statuses.rage)return false;
  if(c.includes('チャージ状態')&&!unit.statuses.charge)return false;
  if(c.includes('スリープ状態の敵')){if(!allUnits.filter(u=>u.team!==unit.team&&u.alive&&u.inField&&u.statuses.sleep).length)return false;}
  if(c.includes('カース状態の敵')){if(!allUnits.filter(u=>u.team!==unit.team&&u.alive&&u.inField&&u.statuses.curse).length)return false;}
  if(c.includes('1人で戦っている')){if(allUnits.filter(u=>u.team===unit.team&&u.alive&&u.inField).length>1)return false;}
  if(c.includes('敵を2体倒')){if(allUnits.filter(u=>u.team!==unit.team&&!u.alive).length<2)return false;}
  if(c.includes('300TU以上経過')&&unit.tuElapsed<300)return false;
  if(c.includes('1回のみ')&&unit.lifeFlipUsed)return false;
  return true;
}

function aiPickSkill(unit,allUnits){
  const as=unit.skills.filter(s=>s.type==='ア');
  const usable=as.filter(s=>canUseSkill(unit,s,allUnits));
  if(!usable.length)return as[as.length-1];
  const strong=usable.filter(s=>s.order<=3);
  if(strong.length&&unit.mp>=2)return strong[Math.floor(Math.random()*strong.length)];
  const med=usable.filter(s=>s.order===4);
  if(med.length)return med[0];
  return usable[usable.length-1];
}

function getTargets(unit,skill,allUnits,chosen){
  const enemies=allUnits.filter(u=>u.team!==unit.team&&u.alive&&u.inField);
  const tg=skill.target;
  if(tg==='敵全体')return enemies;
  if(tg==='敵2体'){
    if(enemies.length<=2)return enemies;
    if(chosen&&chosen.length===2){return chosen.map(i=>enemies[i]).filter(Boolean);}
    if(typeof chosen==='number'){
      const t=[enemies[chosen]];const ot=enemies.filter((_,i)=>i!==chosen);
      if(ot.length)t.push(ot[Math.floor(Math.random()*ot.length)]);return t;
    }
    return enemies.slice(0,2);
  }
  if(tg==='敵1体'){
    const blocker=enemies.find(u=>u.statuses.block);
    if(blocker)return[blocker];
    if(typeof chosen==='number')return[enemies[chosen]];
    if(chosen&&chosen.length)return[enemies[chosen[0]]];
    return[enemies[0]];
  }
  return[];
}

function App(){
  const[screen,setScreen]=useState('title');
  const[pp,setPp]=useState([]);const[ep,setEp]=useState([]);
  const[sf,setSf]=useState('player');
  const[bs,setBs]=useState(null);const[winner,setWinner]=useState(null);
  function startSelect(){setPp([]);setEp([]);setSf('player');setScreen('select');}
  function startBattle(){
    const pU=pp.map((c,i)=>mkUnit(c,'p',i));const eU=ep.map((c,i)=>mkUnit(c,'e',i));
    const all=[...pU,...eU];const logs=[];
    all.forEach(u=>{if(u.inField){u.tu=Math.max(10,500-u.spd);applyPassive(u,all,logs,0);}});
    setBs({units:all,logs,turn:0,globalTU:0});setWinner(null);setScreen('battle');
  }
  if(screen==='title')return h(TitleScreen,{onStart:startSelect});
  if(screen==='select')return h(PartySelect,{pp,setPp,ep,setEp,sf,setSf,onStart:startBattle});
  if(screen==='battle')return h(BattleScreen,{bs,setBs,winner,setWinner,onBack:()=>setScreen('title')});
  return null;
}

}

function PartySelect({pp,setPp,ep,setEp,sf,setSf,onStart}){
  const[preview,setPreview]=useState(null);
  const[af,setAf]=useState('all');const[search,setSearch]=useState('');const[cf,setCf]=useState('all');
  const party=sf==='player'?pp:ep;const setParty=sf==='player'?setPp:setEp;
  const chars=[...new Set(CARDS.map(c=>c.char))].sort();
  let fil=CARDS;
  if(af!=='all')fil=fil.filter(c=>c.attr===af);
  if(cf!=='all')fil=fil.filter(c=>c.char===cf);
  if(search)fil=fil.filter(c=>c.name.includes(search)||c.char.includes(search));
  const isSel=c=>party.some(x=>x.id===c.id);
  function toggle(c){if(isSel(c))setParty(party.filter(x=>x.id!==c.id));else if(party.length<6)setParty([...party,c]);}
  function randomE(){setEp([...CARDS].sort(()=>Math.random()-0.5).slice(0,6));}
  const canBattle=pp.length===6&&ep.length===6;
  return h('div',{className:'app'},
    h('div',{className:'screen-header'},
      h('div',null,h('div',{className:'screen-title'},sf==='player'?'自分のパーティ':'対戦相手'),h('div',{className:'slot-count'},party.length+'/6')),
      sf==='player'&&pp.length===6?h('button',{className:'btn btn-sm btn-primary',onClick:()=>setSf('enemy')},'次へ→'):
      sf==='enemy'&&canBattle?h('button',{className:'btn btn-sm btn-primary',onClick:onStart},'戦闘開始!'):null),
    h('div',{className:'enemy-select-mode'},
      h('button',{className:'tab-btn'+(sf==='player'?' active':''),onClick:()=>setSf('player')},'自分'),
      h('button',{className:'tab-btn'+(sf==='enemy'?' active':''),onClick:()=>setSf('enemy')},'相手')),
    sf==='enemy'?h('div',{style:{padding:'4px 8px'}},h('button',{className:'btn btn-secondary btn-sm',style:{width:'100%'},onClick:randomE},'おまかせ（ランダム）')):null,
    h('div',{className:'filter-bar'},
      h('input',{className:'search-input',placeholder:'カード名・キャラ名で検索',value:search,onChange:e=>setSearch(e.target.value)}),
      h('button',{className:'filter-btn'+(af==='all'?' active':''),onClick:()=>setAf('all')},'全'),
      h('button',{className:'filter-btn'+(af==='R'?' active':''),onClick:()=>setAf('R'),style:{color:'var(--red)'}},'赤'),
      h('button',{className:'filter-btn'+(af==='B'?' active':''),onClick:()=>setAf('B'),style:{color:'var(--blue)'}},'青'),
      h('button',{className:'filter-btn'+(af==='G'?' active':''),onClick:()=>setAf('G'),style:{color:'var(--green)'}},'緑'),
      h('select',{value:cf,onChange:e=>setCf(e.target.value),style:{padding:'4px',borderRadius:14,fontSize:10,background:'var(--surface2)',color:'var(--text)',border:'1px solid #333',fontFamily:'inherit'}},
        h('option',{value:'all'},'全キャラ'),...chars.map(ch=>h('option',{key:ch,value:ch},ch)))),
    h('div',{className:'card-grid',style:{paddingBottom:120}},
      ...fil.map(card=>h('div',{key:card.id,className:'card-item'+(isSel(card)?' selected':''),onClick:()=>setPreview(card)},
        h('div',{className:'card-attr-line attr-'+card.attr}),
        h('img',{className:'card-img',src:card.img,alt:card.name,loading:'lazy',onError:e=>{e.target.style.background='#333';e.target.style.minHeight='60px'}}),
        h('div',{className:'card-name'},card.name),
        h('div',{className:'card-char'},card.char),
        h('div',{className:'card-stats-mini'},h('span',{className:'stat-tag'},'HP'+card.hp),h('span',{className:'stat-tag'},'攻'+card.atk))))),
    h('div',{className:'party-slots'},
      h('div',{className:'slot-label'},'前衛'),
      h('div',{className:'slots-row'},...[0,1,2,3].map(i=>h('div',{key:i,className:'slot'},
        party[i]?h(Fragment,null,h('img',{src:party[i].img,alt:'',onError:e=>{e.target.style.background='#555'}}),
          h('button',{className:'remove-btn',onClick:e=>{e.stopPropagation();setParty(party.filter((_,j)=>j!==i))}},'×')):h('span',{style:{fontSize:8,color:'#555'}},i+1)))),
      h('div',{className:'slot-label'},'増援'),
      h('div',{className:'slots-row'},...[4,5].map(i=>h('div',{key:i,className:'slot'},
        party[i]?h(Fragment,null,h('img',{src:party[i].img,alt:'',onError:e=>{e.target.style.background='#555'}}),
          h('button',{className:'remove-btn',onClick:e=>{e.stopPropagation();setParty(party.filter((_,j)=>j!==i))}},'×')):h('span',{style:{fontSize:8,color:'#555'}},i-3)))),
      h('div',{className:'party-actions'},h('button',{className:'btn btn-sm btn-secondary',onClick:()=>setParty([])},'リセット'))),
    preview?h(CardModal,{card:preview,onClose:()=>setPreview(null),onSelect:c=>{toggle(c);setPreview(null)},selected:isSel(preview)}):null);
}

function BattleScreen({bs,setBs,winner,setWinner,onBack}){
  const[selSkill,setSelSkill]=useState(null);
  const[waitTarget,setWaitTarget]=useState(false);
  const[targetCount,setTargetCount]=useState(1);
  const[chosenTargets,setChosenTargets]=useState([]);
  const[logExpanded,setLogExpanded]=useState(false);
  const logRef=useRef(null);const autoRef=useRef(null);
  const{units,logs,globalTU}=bs;
  const fieldUnits=units.filter(u=>u.inField);

  useEffect(()=>{if(logRef.current&&!logExpanded)logRef.current.scrollTop=logRef.current.scrollHeight;},[logs.length]);

  function getActiveUnit(){
    const alive=fieldUnits.filter(u=>u.alive);if(!alive.length)return null;
    alive.sort((a,b)=>a.tu-b.tu);return alive[0];
  }

  function advanceTU(all){
    const alive=all.filter(u=>u.inField&&u.alive);if(!alive.length)return 0;
    const minTU=Math.min(...alive.map(u=>u.tu));
    alive.forEach(u=>{u.tu-=minTU;u.tuElapsed+=minTU;});return minTU;
  }

  function checkReinforcements(all,team,newLogs,gtu){
    const fa=all.filter(u=>u.team===team&&u.inField&&u.alive);
    const res=all.filter(u=>u.team===team&&!u.inField&&u.alive);
    if(fa.length<4&&res.length>0){
      const nxt=res[0];nxt.inField=true;nxt.tu=Math.max(10,500-nxt.spd);
      const tm=team==='p'?'【味方】':'【敵】';
      newLogs.push({tu:gtu,team:team,t:'info',m:tm+'増援：'+nxt.char+'('+nxt.name+')参戦!'});
      const pas=nxt.skills.find(s=>s.type==='パ');
      if(pas&&pas.cond&&pas.cond.includes('増援から戦闘に参加した時')){
        applyEntrySkill(nxt,all,newLogs,gtu);
      }
      applyPassive(nxt,all,newLogs,gtu);
    }
  }

  function applyEntrySkill(unit,all,logs,gtu){
    const p=unit.skills.find(s=>s.type==='パ');if(!p)return;
    const n=p.name;const tm=unit.team==='p'?'【味方】':'【敵】';
    const enemies=all.filter(u=>u.team!==unit.team&&u.alive&&u.inField);
    if(n.includes('スタンエントリー')){
      let t;
      if(p.effect.includes('TUが最も高い'))t=enemies.length?enemies.reduce((a,b)=>a.tu>b.tu?a:b):null;
      else if(p.effect.includes('TUが最も低い'))t=enemies.length?enemies.reduce((a,b)=>a.tu<b.tu?a:b):null;
      else t=enemies.length?enemies[Math.floor(Math.random()*enemies.length)]:null;
      if(t){t.tu+=300;const etm=t.team==='p'?'【味方】':'【敵】';logs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+'→'+etm+t.char+'：スタン(300TU)'});}
    }
    else if(n.includes('スリープエントリー')){
      let t;
      if(p.effect.includes('TUが最も高い'))t=enemies.length?enemies.reduce((a,b)=>a.tu>b.tu?a:b):null;
      else if(p.effect.includes('TUが最も低い'))t=enemies.length?enemies.reduce((a,b)=>a.tu<b.tu?a:b):null;
      else t=enemies.length?enemies[Math.floor(Math.random()*enemies.length)]:null;
      if(t){t.statuses.sleep=true;const etm=t.team==='p'?'【味方】':'【敵】';logs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+'→'+etm+t.char+'：スリープ'});}
    }
    else if(n.includes('ポイズンエントリー')){
      const t=enemies.length?enemies[Math.floor(Math.random()*enemies.length)]:null;
      if(t){t.statuses.poison={atk:unit.atk};const etm=t.team==='p'?'【味方】':'【敵】';logs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+'→'+etm+t.char+'：ポイズン'});}
    }
    else if(n.includes('俊敏性ダウンエントリー')){
      const t=enemies.length?enemies[Math.floor(Math.random()*enemies.length)]:null;
      if(t){t.statuses.speedDown=true;delete t.statuses.speedUp;const etm=t.team==='p'?'【味方】':'【敵】';logs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+'→'+etm+t.char+'：俊敏性ダウン'});}
    }
  }

  function checkWin(all){
    if(!all.filter(u=>u.team==='p'&&u.alive).length)return'enemy';
    if(!all.filter(u=>u.team==='e'&&u.alive).length)return'player';
    return null;
  }

  function handleDeath(unit,killer,all,newLogs,gtu){
    unit.hp=0;unit.alive=false;
    const tm=unit.team==='p'?'【味方】':'【敵】';
    newLogs.push({tu:gtu,team:null,t:'info',m:'💀 '+tm+unit.char+'('+unit.name+') 撃破!'});
    const pas=unit.skills.find(s=>s.type==='パ');
    if(pas&&killer){
      const pn=pas.name;
      if(pn.includes('リベンジ')&&killer.alive){
        const ktm=killer.team==='p'?'【味方】':'【敵】';
        if(pn.includes('スタン')){killer.tu+=300;newLogs.push({tu:gtu,team:unit.team,t:'status',m:ktm+killer.char+'：スタン(300TU)'});}
        if(pn.includes('スリープ')){killer.statuses.sleep=true;newLogs.push({tu:gtu,team:unit.team,t:'status',m:ktm+killer.char+'：スリープ'});}
        if(pn.includes('カース')){killer.statuses.curse=true;newLogs.push({tu:gtu,team:unit.team,t:'status',m:ktm+killer.char+'：カース'});}
        if(pn.includes('ポイズン')){killer.statuses.poison={atk:unit.atk};newLogs.push({tu:gtu,team:unit.team,t:'status',m:ktm+killer.char+'：ポイズン'});}
        if(pn.includes('俊敏性ダウン')){killer.statuses.speedDown=true;delete killer.statuses.speedUp;newLogs.push({tu:gtu,team:unit.team,t:'status',m:ktm+killer.char+'：俊敏性ダウン'});}
      }
    }
    checkReinforcements(all,unit.team,newLogs,gtu);
  }

  function executeSkill(unit,skill,all,newLogs,targetIdx,gtu){
    unit.mp=Math.min(10,unit.mp+skill.mp);
    let tuCost=skill.tu;
    if(unit.statuses.speedUp)tuCost=Math.floor(tuCost*0.8);
    if(unit.statuses.speedDown)tuCost=Math.floor(tuCost*1.2);
    unit.tu+=tuCost;
    const tm=unit.team==='p'?'【味方】':'【敵】';
    const sn=skill.name;
    newLogs.push({tu:gtu,team:unit.team,t:'info',m:tm+unit.char+' → '+sn});

    if(sn==='ライフフリップ'){
      const lost=unit.maxHp-unit.hp;unit.hp=Math.max(1,lost);unit.lifeFlipUsed=true;
      newLogs.push({tu:gtu,team:unit.team,t:'heal',m:tm+unit.char+': HP='+unit.hp});return;
    }
    if(sn==='ディフェンスブースト'){unit.pd=Math.floor(unit.pd*1.1);unit.sd=Math.floor(unit.sd*1.1);
      newLogs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+': 防御力UP'});return;}
    if(sn==='物攻アップ'){unit.pa=Math.floor(unit.pa*1.1);newLogs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+': 物攻UP'});return;}
    if(sn==='特攻アップ'){unit.sa=Math.floor(unit.sa*1.1);newLogs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+': 特攻UP'});return;}
    if(sn==='俊敏性アップ'){unit.statuses.speedUp=true;delete unit.statuses.speedDown;
      newLogs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+': 俊敏性UP'});return;}
    if(sn==='憤怒（レイジ）'){unit.statuses.rage=3;newLogs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+': レイジ状態'});return;}
    if(sn==='チャージブースト'||sn==='チャージ'){
      unit.statuses.charge=true;unit.hp=Math.min(unit.maxHp,unit.hp+Math.floor(unit.maxHp*0.05));
      unit.pd=Math.floor(unit.pd*1.1);unit.sd=Math.floor(unit.sd*1.1);
      newLogs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+': チャージ状態'});return;}
    if(sn.includes('ブロック')){unit.statuses.block=true;newLogs.push({tu:gtu,team:unit.team,t:'status',m:tm+unit.char+': ブロック状態'});return;}

    // カースブルー/グリーン/レッド → 対応属性のみ
    if(sn==='カースブルー'||sn==='カースグリーン'||sn==='カースレッド'){
      const attrMap={カースブルー:'B',カースグリーン:'G',カースレッド:'R'};
      const targetAttr=attrMap[sn];
      const enemies=all.filter(u=>u.team!==unit.team&&u.alive&&u.inField&&u.attr===targetAttr);
      enemies.forEach(t=>{
        let dmg=calcDmg(unit,t,skill);t.hp-=dmg;t.statuses.curse=true;
        const etm=t.team==='p'?'【味方】':'【敵】';
        newLogs.push({tu:gtu,team:unit.team,t:'dmg',m:etm+t.char+'に'+dmg+'ダメージ+カース(残HP:'+Math.max(0,t.hp)+')'});
        if(t.hp<=0)handleDeath(t,unit,all,newLogs,gtu);
      });
      if(!enemies.length)newLogs.push({tu:gtu,team:unit.team,t:'info',m:'対象属性の敵なし'});
      return;
    }
    if(sn==='カースアタック'){
      const targets=getTargets(unit,skill,all,targetIdx);
      targets.forEach(t=>{if(!t.alive)return;
        let dmg=calcDmg(unit,t,skill);t.hp-=dmg;t.statuses.curse=true;
        const etm=t.team==='p'?'【味方】':'【敵】';
        newLogs.push({tu:gtu,team:unit.team,t:'dmg',m:etm+t.char+'に'+dmg+'ダメージ+カース(残HP:'+Math.max(0,t.hp)+')'});
        if(t.hp<=0)handleDeath(t,unit,all,newLogs,gtu);
      });return;
    }

    const targets=getTargets(unit,skill,all,targetIdx);
    if(!targets.length){newLogs.push({tu:gtu,team:unit.team,t:'info',m:'対象なし'});return;}
    if(sn==='チャージインパクト')unit.statuses.charge=false;
    if(sn==='ドリームイーター')targets.forEach(t=>{if(t.statuses.sleep)delete t.statuses.sleep;});

    targets.forEach(t=>{
      if(!t.alive)return;
      if(t.statuses.sleep&&sn!=='ドリームイーター'){delete t.statuses.sleep;
        const etm=t.team==='p'?'【味方】':'【敵】';
        newLogs.push({tu:gtu,team:unit.team,t:'status',m:etm+t.char+': 目覚めた'});}
      let dmg=calcDmg(unit,t,skill);t.hp-=dmg;
      const etm=t.team==='p'?'【味方】':'【敵】';
      newLogs.push({tu:gtu,team:unit.team,t:'dmg',m:etm+t.char+'に'+dmg+'ダメージ(残HP:'+Math.max(0,t.hp)+')'});
      if(t.hp<=0&&t.ironHeart&&!t.ironHeartUsed){t.hp=1;t.ironHeartUsed=true;
        newLogs.push({tu:gtu,team:t.team,t:'status',m:etm+t.char+': アイアンハートで耐えた!'});}
      if(t.hp<=0)handleDeath(t,unit,all,newLogs,gtu);
    });
    if(sn.includes('ペイン')){
      const sd=Math.floor(unit.maxHp*0.1);unit.hp-=sd;
      newLogs.push({tu:gtu,team:unit.team,t:'dmg',m:tm+unit.char+': 反動'+sd+'ダメージ'});
      if(unit.hp<=0)handleDeath(unit,null,all,newLogs,gtu);
    }
  }

  function processTurn(skillChoice,targetIdx){
    const nu=units.map(u=>({...u,statuses:{...u.statuses}}));
    const nl=[...logs];let gtu=globalTU;
    const adv=advanceTU(nu);gtu+=adv;
    const active=nu.filter(u=>u.inField&&u.alive).sort((a,b)=>a.tu-b.tu)[0];
    if(!active)return;
    if(active.statuses.sleep){
      delete active.statuses.sleep;active.tu+=100;
      const tm=active.team==='p'?'【味方】':'【敵】';
      nl.push({tu:gtu,team:active.team,t:'status',m:tm+active.char+': スリープから目覚めた'});
    }else{
      let skill;
      if(active.team==='p')skill=skillChoice;
      else{skill=aiPickSkill(active,nu);targetIdx=undefined;}
      if(skill)executeSkill(active,skill,nu,nl,targetIdx,gtu);
    }
    nu.filter(u=>u.alive&&u.inField&&u.statuses.poison).forEach(u=>{
      const pd=Math.floor(u.statuses.poison.atk*0.05);u.hp-=pd;
      const utm=u.team==='p'?'【味方】':'【敵】';
      nl.push({tu:gtu,team:null,t:'dmg',m:utm+u.char+': 毒ダメージ'+pd+'(残HP:'+Math.max(0,u.hp)+')'});
      if(u.hp<=0)handleDeath(u,null,nu,nl,gtu);
    });
    nu.filter(u=>u.statuses.rage).forEach(u=>{u.statuses.rage--;if(u.statuses.rage<=0){delete u.statuses.rage;
      const utm=u.team==='p'?'【味方】':'【敵】';nl.push({tu:gtu,team:u.team,t:'status',m:utm+u.char+': レイジ解除'});}});
    const w=checkWin(nu);
    setBs({units:nu,logs:nl,turn:bs.turn+1,globalTU:gtu});
    if(w)setWinner(w);
    setSelSkill(null);setWaitTarget(false);setChosenTargets([]);
  }

  useEffect(()=>{
    if(winner)return;
    const alive=units.filter(u=>u.inField&&u.alive);if(!alive.length)return;
    const sorted=[...alive].sort((a,b)=>a.tu-b.tu);const act=sorted[0];
    if(act&&act.team==='e'){
      autoRef.current=setTimeout(()=>processTurn(null),700);
    }
    return()=>clearTimeout(autoRef.current);
  },[bs.turn,winner]);

  const alive=units.filter(u=>u.inField&&u.alive);
  const sorted=[...alive].sort((a,b)=>a.tu-b.tu);
  const activeUnit=sorted[0];
  const isPlayerTurn=activeUnit&&activeUnit.team==='p'&&!winner;
  const playerSkills=isPlayerTurn?activeUnit.skills.filter(s=>s.type==='ア'):[];
  const timeline=[...alive].sort((a,b)=>a.tu-b.tu).slice(0,8);

  function onSkillSelect(skill){
    if(!canUseSkill(activeUnit,skill,units))return;
    const tg=skill.target;
    if(tg==='敵1体'){setSelSkill(skill);setWaitTarget(true);setTargetCount(1);setChosenTargets([]);}
    else if(tg==='敵2体'){
      const enemies=units.filter(u=>u.team==='e'&&u.alive&&u.inField);
      if(enemies.length<=2){processTurn(skill);return;}
      setSelSkill(skill);setWaitTarget(true);setTargetCount(2);setChosenTargets([]);
    }
    else{processTurn(skill);}
  }

  function onTargetClick(idx){
    if(targetCount===1){processTurn(selSkill,idx);}
    else{
      let nc=[...chosenTargets];
      if(nc.includes(idx))nc=nc.filter(x=>x!==idx);
      else{if(nc.length<targetCount)nc.push(idx);else{nc.shift();nc.push(idx);}}
      setChosenTargets(nc);
    }
  }
  function confirmTargets(){if(chosenTargets.length===targetCount)processTurn(selSkill,chosenTargets);}

  function downloadLog(){
    const txt=logs.map(l=>'[TU:'+l.tu+'] '+l.m).join('\n');
    const blob=new Blob([txt],{type:'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='battle_log.txt';a.click();URL.revokeObjectURL(url);
  }

  // Status display helper
  function statusBadges(u){
    const badges=[];
    if(u.statuses.curse)badges.push(h('span',{key:'curse',className:'status-icon st-curse',title:'カース'},'呪'));
    if(u.statuses.poison)badges.push(h('span',{key:'poison',className:'status-icon st-poison',title:'ポイズン'},'毒'));
    if(u.statuses.sleep)badges.push(h('span',{key:'sleep',className:'status-icon st-sleep',title:'スリープ'},'眠'));
    if(u.statuses.rage)badges.push(h('span',{key:'rage',className:'status-icon st-rage'},'怒'+u.statuses.rage));
    if(u.statuses.charge)badges.push(h('span',{key:'charge',className:'status-icon st-charge'},'充'));
    if(u.statuses.block)badges.push(h('span',{key:'block',className:'status-icon st-block'},'盾'));
    if(u.statuses.speedUp)badges.push(h('span',{key:'su',className:'status-icon st-spdup'},'速↑'));
    if(u.statuses.speedDown)badges.push(h('span',{key:'sd',className:'status-icon st-spddn'},'速↓'));
    if(u.ironHeart&&!u.ironHeartUsed)badges.push(h('span',{key:'ih',className:'status-icon st-iron'},'鉄'));
    return badges;
  }

  function renderUnit(u,isEnemy){
    const hpPct=Math.max(0,u.hp/u.maxHp*100);const mpPct=u.mp/10*100;
    const hpC=hpPct>50?'hp-high':hpPct>25?'hp-mid':'hp-low';
    const isAct=activeUnit&&u.id===activeUnit.id;
    const isTgt=waitTarget&&isEnemy&&u.alive;
    const isTgtSel=isTgt&&chosenTargets.includes(units.filter(x=>x.team==='e'&&x.inField&&x.alive).indexOf(u));
    return h('div',{key:u.id,
      className:'unit-card'+(isAct?' active':'')+(u.alive?'':' dead')+(isTgt?' targeted':'')+(isTgtSel?' target-selected':''),
      onClick:()=>{if(isTgt){
        const enemies=units.filter(x=>x.team==='e'&&x.inField&&x.alive);
        const idx=enemies.indexOf(u);if(idx>=0)onTargetClick(idx);
      }}},
      h('div',{className:'card-attr-line attr-'+u.attr}),
      h('img',{className:'unit-thumb',src:u.img,alt:'',loading:'lazy',onError:e=>{e.target.style.background='#333'}}),
      h('div',{className:'unit-name-sm'},u.char),
      h('div',{className:'bar-row'},
        h('span',{className:'bar-label bar-label-hp'},'HP'),
        h('div',{className:'bar-wrap'},h('div',{className:'hp-fill '+hpC,style:{width:hpPct+'%'}})),
        h('span',{className:'bar-val'},Math.max(0,u.hp)+'/'+u.maxHp)),
      h('div',{className:'bar-row'},
        h('span',{className:'bar-label bar-label-mp'},'MP'),
        h('div',{className:'bar-wrap bar-wrap-mp'},h('div',{className:'mp-fill',style:{width:mpPct+'%'}})),
        h('span',{className:'bar-val'},u.mp+'/10')),
      h('div',{className:'tu-badge'},'TU:'+u.tu),
      h('div',{className:'status-icons'},...statusBadges(u)));
  }

  return h('div',{className:'app battle-screen'},
    h('div',{className:'battle-top-bar'},
      h('span',null,'Turn '+bs.turn),
      h('span',{className:'tu-counter'},'経過TU: '+globalTU),
      h('span',{style:{cursor:'pointer'},onClick:()=>setLogExpanded(!logExpanded)},'📜ログ')),
    h('div',{className:'battle-field'},
      h('div',{className:'team-area'},
        h('div',{className:'team-label'},h('span',null,'👿 相手')),
        h('div',{className:'unit-row'},...units.filter(u=>u.team==='e'&&u.inField).map(u=>renderUnit(u,true)))),
      h('div',{className:'timeline-bar'},
        h('div',{className:'timeline-label'},'⏱ タイムライン'),
        h('div',{className:'timeline-units'},...timeline.map((u,i)=>
          h('div',{key:u.id,className:'tl-unit'+(u.team==='p'?' tl-ally':' tl-enemy')+(i===0?' tl-active':'')},
            h('div',null,u.char.slice(0,3)),h('div',null,u.tu))))),
      h('div',{className:'team-area'},
        h('div',{className:'team-label'},h('span',null,'⚔ 自分')),
        h('div',{className:'unit-row'},...units.filter(u=>u.team==='p'&&u.inField).map(u=>renderUnit(u,false))))),
    h('div',{className:'battle-log-container'},
      h('div',{className:'battle-log-header',onClick:()=>setLogExpanded(!logExpanded)},
        h('span',null,'戦闘ログ'+(logExpanded?' ▼':' ▲')),
        h('span',null,logs.length+'件')),
      h('div',{className:'battle-log'+(logExpanded?' expanded':''),ref:logRef},
        ...logs.map((l,i)=>h('div',{key:i,className:'log-entry'},
          h('span',{className:'log-tu'},l.tu+'TU'),
          h('span',{className:'log-'+l.t},l.m)))),
      logExpanded?h('button',{className:'btn btn-sm btn-secondary log-close-btn',onClick:()=>setLogExpanded(false)},'閉じる'):null),
    winner?h('div',{style:{padding:12,textAlign:'center',background:'var(--surface)',borderTop:'1px solid #222'}},
      h('div',{style:{fontSize:20,fontWeight:900,marginBottom:8,color:winner==='player'?'var(--gold)':'var(--red)'}},
        winner==='player'?'🎉 勝利!':'💀 敗北...'),
      h('div',{className:'result-btns'},
        h('button',{className:'btn btn-sm btn-primary',onClick:downloadLog},'📥 ログをダウンロード'),
        h('button',{className:'btn btn-sm btn-secondary',onClick:onBack},'タイトルへ戻る'))):
    isPlayerTurn?h('div',{className:'skill-panel'},
      h('div',{className:'skill-panel-title'},'🎯 '+activeUnit.char+' (MP:'+activeUnit.mp+')'),
      h('div',{className:'skill-buttons'},
        ...playerSkills.map(s=>{
          const usable=canUseSkill(activeUnit,s,units);
          return h('button',{key:s.order,className:'skill-btn',disabled:!usable,onClick:()=>onSkillSelect(s)},
            h('div',{className:'skill-btn-name'},s.name),
            h('div',{className:'skill-btn-info'},
              h('span',{className:'skill-tu'},s.tu+'TU'),
              h('span',{className:s.mp>=0?'skill-mp-plus':'skill-mp-minus'},(s.mp>=0?'+':'')+s.mp+'MP'),
              s.dmg?h('span',null,s.dmg+'倍'):null,s.target?h('span',null,s.target):null),
            h('div',{className:'skill-btn-effect'},s.effect),
            s.cond?h('div',{style:{fontSize:8,color:'var(--accent)',marginTop:1}},s.cond):null);})))
    :h('div',{style:{padding:10,textAlign:'center',color:'var(--text2)',fontSize:10,background:'var(--surface)',borderTop:'1px solid #222'}},'相手のターン...'),
    waitTarget?h('div',{className:'target-overlay'},
      h('div',{className:'target-title'},targetCount===1?'ターゲットを選択（上の敵をタップ）':'2体のターゲットを選択（上の敵をタップ）'),
      targetCount===2?h('div',{className:'target-info'},'選択中: '+chosenTargets.length+'/'+targetCount):null,
      h('div',{className:'target-actions'},
        targetCount===2&&chosenTargets.length===targetCount?h('button',{className:'btn btn-sm btn-primary',onClick:confirmTargets},'決定'):null,
        h('button',{className:'btn btn-sm btn-secondary',onClick:()=>{setWaitTarget(false);setSelSkill(null);setChosenTargets([]);}},'キャンセル'))):null);
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
